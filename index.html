<style>
  body {
    margin: 0;
    font-family: 'Georgia', serif; /* Ավելի էսթետիկ տառատեսակ */
    background: #fdfaf5;
    color: #3e2723;
  }

  /* VIDEO SECTION */
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .hero video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }
  .hero-text h1 {
    color: white;
    font-size: 3.5rem;
    letter-spacing: 12px;
    text-shadow: 2px 2px 20px rgba(0,0,0,0.4);
    font-weight: 300;
  }

  /* NEW GRID SECTION */
  .container {
    max-width: 1200px;
    margin: 80px auto;
    padding: 0 20px;
    text-align: center;
  }

  .container h2 {
    font-size: 2rem;
    margin-bottom: 40px;
    font-weight: 300;
    font-style: italic;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 սյունակ */
    gap: 30px;
  }

  .grid-item {
    background: white;
    padding-bottom: 20px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: transform 0.4s ease;
  }

  .grid-item:hover {
    transform: translateY(-10px); /* Մկնիկը պահելիս վերև է բարձրանում */
  }

  .grid-item img {
    width: 100%;
    height: 350px;
    object-fit: cover;
  }

  .grid-item h3 {
    font-size: 1.2rem;
    margin: 20px 0 10px;
    letter-spacing: 1px;
  }

  .grid-item p {
    font-size: 0.9rem;
    color: #8d7b68;
    padding: 0 15px;
    line-height: 1.6;
  }

  /* MOBILE */
  @media(max-width: 900px) {
    .grid { grid-template-columns: 1fr; } /* Հեռախոսի վրա 1 սյունակ */
    .hero-text h1 { font-size: 2rem; letter-spacing: 5px; }
  }
</style>

<body>

  <div class="hero">
    <video autoplay muted loop>
      <source src="https://cdn.shopify.com/videos/c/o/v/c7830c6bfb704c078786e6954d93e900.mp4">
    </video>
    <div class="hero-text">
      <h1>LUNALIQ</h1>
    </div>
  </div>

  <div class="container">
    <h2>Explore Our Moments</h2>
    
    <div class="grid">
      <div class="grid-item">
        <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_48_496598286_17942634347995359_2385501179447426054_n.jpg?v=1776708817">
        <h3>Morning Ritual</h3>
        <p>Start your day with the perfect balance of aroma and taste.</p>
      </div>

      <div class="grid-item">
        <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_52_545018420_17957024291995359_2100240977493378914_n.jpg?v=1776708816">
        <h3>Cozy Space</h3>
        <p>A place where every corner tells a story of comfort.</p>
      </div>

      <div class="grid-item">
        <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_53_546500703_17957024300995359_3799390271029334196_n.jpg?v=1776708816">
        <h3>Perfect Brew</h3>
        <p>Expertly crafted coffee for those who appreciate quality.</p>
      </div>
    </div>
  </div>

</body>

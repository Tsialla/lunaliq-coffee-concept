<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaliq Coffee | Luxury Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fdfaf5;
            --text-color: #3e2723;
            --accent-color: #8d7b68;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.8);
        }
        .hero-text h1 {
            color: white;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
        }

        /* ABOUT SECTION */
        .about {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 1100px;
            margin: 100px auto;
            padding: 0 20px;
        }
        .about-img {
            flex: 1;
            border-radius: 300px 300px 0 0; /* Aesthetic arch shape */
            overflow: hidden;
            height: 500px;
        }
        .about-img img { width: 100%; height: 100%; object-fit: cover; }
        .about-content { flex: 1; }
        .about-content h2 { font-size: 2.8rem; margin-bottom: 20px; }

        /* GRID SECTION */
        .container { max-width: 1200px; margin: 100px auto; padding: 0 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .grid-item { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: 0.4s;
        }
        .grid-item:hover { transform: translateY(-10px); }
        .grid-item img { width: 100%; height: 350px; object-fit: cover; }
        .grid-item h3 { padding: 20px 0 10px; font-size: 1.5rem; }

        /* MENU SECTION */
        .menu-section { background: white; padding: 100px 20px; }
        .menu-container { max-width: 700px; margin: 0 auto; }
        .menu-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }

        /* FOOTER */
        footer {
            background: #1a1412;
            color: #d8c3a5;
            padding: 60px 20px;
            text-align: center;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            max-width: 1000px;
            margin: 0 auto 40px;
            gap: 40px;
        }
        .footer-logo { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 5px; }

        /* Ընդհանուր ոճեր */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfaf5;
            color: #3e2723;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            margin: 0;
        }

        /* Hero Section (Video) */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .hero-text {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .hero-text h1 {
            color: #fff;
            font-size: clamp(2.5rem, 10vw, 6rem);
            letter-spacing: 15px;
            text-transform: uppercase;
        }

        /* About Section (Arch Concept) */
        .about-section {
            display: flex;
            align-items: center;
            max-width: 1100px;
            margin: 100px auto;
            padding: 0 20px;
            gap: 60px;
        }

        .about-image {
            flex: 1;
            height: 550px;
            border-radius: 250px 250px 20px 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-content {
            flex: 1;
        }

        .about-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .about-content p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #6d5d5a;
        }

        /* Grid Section (Atmosphere) */
        .gallery-container {
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 20px;
            text-align: center;
        }

        .gallery-container h2 {
            font-size: 2.5rem;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .grid-item {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .grid-item:hover {
            transform: translateY(-10px);
        }

        .grid-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .grid-item h3 {
            padding: 20px 10px 5px;
            font-size: 1.5rem;
        }

        .grid-item p {
            padding: 0 20px 25px;
            font-size: 0.9rem;
            color: #8d7b68;
        }

        /* Menu Section */
        .menu-section {
            background-color: #fff;
            padding: 100px 20px;
        }

        .menu-wrapper {
            max-width: 700px;
            margin: 0 auto;
        }

        .menu-wrapper h2 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 50px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaliq Coffee | Official</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: #fdfaf5; color: #3e2723; overflow-x: hidden; }
        
        header { background-color: #fdfaf5; padding: 40px 0; text-align: center; border-bottom: 1px solid #f0ece6; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 12px; text-transform: uppercase; }

        /* 1. HERO VIDEO */
        .hero { position: relative; height: 70vh; overflow: hidden; background: #000; }
        .hero video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        /* --- NEW: INFINITE IMAGE MARQUEE (ՎԱԶՈՂ ՏՈՂ) --- */
        .marquee {
            width: 100%;
            background-color: #fff;
            overflow: hidden; /* Թաքցնում է դուրս եկած մասը */
            padding: 20px 0;
            border-bottom: 1px solid #f0ece6;
            position: relative;
        }

        /* Կոնտեյներ, որը պարունակում է նկարների 2 լրացված շարք */
        .marquee-content {
            display: flex;
            width: calc(200px * 20); /* Ապահովում է բավարար լայնություն 2 շարքի համար (10+10) */
            animation: marquee-scroll 40s linear infinite; /* Անիմացիան */
        }

        /* Նկարների յուրաքանչյուր շարքը */
        .marquee-slide {
            display: flex;
            gap: 15px; /* Նկարների միջև բացատը */
            padding-right: 15px; /* Ավելացնում է բացատ վերջին նկարից հետո */
        }

        /* Նկարի ոճը */
        .marquee img {
            width: 200px; /* Նկարի լայնությունը */
            height: 200px; /* Նկարի բարձրությունը (սարքում է քառակուսի) */
            object-fit: cover; /* Պահպանում է նկարի համաչափությունը */
            border-radius: 10px; /* Կլորացված անկյուններ */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            flex-shrink: 0; /* Չի թողնում նկարը սեղմվի */
        }

        /* Անիմացիայի սահմանումը */
        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* Տեղաշարժվում է մինչև առաջին շարքի վերջը */
        }
        /* --- END OF NEW MARQUEE --- */

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; text-align: center; }

        /* 2. ABOUT SECTION */
        .about { display: flex; align-items: center; gap: 70px; text-align: left; margin: 100px 0; }
        .about-img { flex: 1; height: 550px; border-radius: 300px 300px 20px 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .about-img img { width: 100%; height: 100%; object-fit: cover; }
        .about-text { flex: 1; }
        .about-text h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 20px; }
        .about-text p { font-size: 1.1rem; line-height: 1.8; color: #5d4e4a; }

        /* 3. ATMOSPHERE GRID */
        .grid-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin: 80px 0 50px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 100px; }
        .grid-item img { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; }
        .grid-item h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-top: 20px; font-style: italic; }

        /* 4. MID VIDEO (BEFORE MENU) */
        .mid-video { width: 100%; height: 60vh; margin: 80px 0; overflow: hidden; position: relative; background: #000; }
        .mid-video video { width: 100%; height: 100%; object-fit: cover; }
        .video-caption { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 10px; text-transform: uppercase; text-shadow: 0 2px 20px rgba(0,0,0,0.6); text-align: center; width: 100%; }

        /* 5. 3 ARCHES MENU */
        .menu-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 30px; flex-wrap: wrap; margin-top: 50px; padding-bottom: 100px; }
        .arch-card { background: #ffffff; width: 330px; padding: 70px 30px 50px; border-radius: 200px 200px 30px 30px; box-shadow: 0 15px 45px rgba(0,0,0,0.04); border: 1px solid #eee; margin-bottom: 30px; }
        .arch-card h3 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 40px; color: #8d7b68; }
        .menu-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dashed #ddd; font-size: 0.95rem; }
        .price { font-weight: 600; color: #a68b6d; }

        /* 6. FOOTER */
        footer { background: #1a1412; color: #d8c3a5; padding: 80px 20px; text-align: center; }

        @media (max-width: 900px) {
            .about { flex-direction: column; text-align: center; }
            .grid { grid-template-columns: 1fr; }
            .about-img { height: 400px; width: 100%; }
            /* Փոքրացնում ենք նկարները հեռախոսի համար */
            .marquee img { width: 150px; height: 150px; }
            .marquee-content { width: calc(150px * 20); }
        }
    </style>
</head>

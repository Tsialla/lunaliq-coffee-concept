<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunaliq Coffee Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f5f3ef;color:#1a1a1a;}

/* HERO VIDEO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}
.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}
.hero-content h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
}
.btn{
  margin-top:20px;
  padding:12px 30px;
  background:#C3B098;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* ABOUT */
.about{padding:100px 20px;}
.about-container{
  max-width:1100px;margin:auto;
  display:flex;gap:40px;align-items:center;
}
.about-text{flex:1;}
.about-text h2{
  font-family:'Playfair Display',serif;
  font-size:36px;margin-bottom:20px;
}
.about-text p{opacity:0.8;margin-bottom:15px;}
.about-image{flex:1;}
.about-image img{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:12px;
}

/* GALLERY */
.gallery{padding:80px 20px;text-align:center;}
.gallery h2{
  margin-bottom:30px;
  font-family:'Playfair Display',serif;
}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  max-width:1100px;margin:auto;
}
.gallery-grid img{
  width:100%;
  height:280px;
  object-fit:cover;
  border-radius:14px;
  transition:0.4s;
}
.gallery-grid img:hover{
  transform:scale(1.05);
}

/* CONTACT */
.contact{padding:80px 20px;text-align:center;}
input,textarea{
  width:100%;max-width:500px;
  padding:12px;margin:10px 0;
}

/* FOOTER */
footer{
  background:#1a1a1a;
  color:white;
  text-align:center;
  padding:20px;
}

/* MOBILE */
@media(max-width:768px){
  .about-container{flex-direction:column;text-align:center;}
  .gallery-grid{grid-template-columns:1fr 1fr;}
  .hero-content h1{font-size:30px;}
}
</style>

</head>

<body>

<!-- VIDEO HERO -->

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.shopify.com/videos/c/o/v/c7830c6bfb704c078786e6954d93e900.mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>LUNALIQ EXPERIENCE</h1>
    <p>Feel the atmosphere</p>
    <a href="index.html" class="btn">Back Home</a>
  </div>
</section>

<!-- ABOUT -->

<section class="about">
  <div class="about-container">
    <div class="about-text">
      <h2>About Lunaliq</h2>
      <p>We create aesthetic coffee moments filled with warmth and calm energy.</p>
      <p>Every detail is designed to give you a cozy and memorable experience.</p>
    </div>

</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaliq Coffee | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fdfaf5;
            --text-color: #3e2723;
            --accent-color: #8d7b68;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        /* HERO SECTION WITH NEW VIDEO */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.7); /* Մի քիչ մութացրել եմ, որ տեքստը լավ երևա */
        }
        .hero-text h1 {
            color: white;
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            letter-spacing: 18px;
            text-transform: uppercase;
            margin: 0;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ABOUT SECTION (ARCH DESIGN) */
        .about {
            display: flex;
            align-items: center;
            gap: 80px;
            max-width: 1100px;
            margin: 120px auto;
            padding: 0 20px;
        }
        .about-img {
            flex: 1;
            border-radius: 300px 300px 20px 20px;
            overflow: hidden;
            height: 550px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

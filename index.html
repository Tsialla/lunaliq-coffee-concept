<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaliq Coffee | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: #fdfaf5; color: #3e2723; }
        
        /* HEADER WITH CENTERED LOGO */
        header {
            background-color: #fdfaf5;
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-decoration: none;
            color: #3e2723;
            font-weight: 400;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 80vh; /* Մի քիչ փոքրացրել եմ, որ լոգոն երևա */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); /* Թեթև մութացում վիդեոյի վրա */
        }

        .about-text { flex: 1; }

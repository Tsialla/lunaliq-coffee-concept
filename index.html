<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunaliq Coffee Video</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:white;
}

/* FULL SCREEN VIDEO */
.video-page{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.video-page video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.3);
}

/* TEXT */
.content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.content h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
  letter-spacing:4px;
}

.content a{
  margin-top:20px;
  padding:12px 30px;
  background:#C3B098;
  border-radius:30px;
  color:white;
  text-decoration:none;
}

/* BACK BUTTON */
.back{
  position:absolute;
  top:20px;
  left:20px;
  z-index:3;
  background:rgba(0,0,0,0.5);
  padding:10px 20px;
  border-radius:20px;
  color:white;
  text-decoration:none;
}
</style>

</head>

<body>

<a href="index.html" class="back">← Back</a>

<section class="video-page">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.shopify.com/videos/c/o/v/c7830c6bfb704c078786e6954d93e900.mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>LUNALIQ EXPERIENCE</h1>
    <a href="index.html">Back to Home</a>
  </div>
</section>

</body>
</html>

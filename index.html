<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaliq Coffee | Official Concept</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fdfaf5; 
            color: #3e2723; 
            overflow-x: hidden;
        }
        
        header {
            background-color: #fdfaf5; padding: 35px 0;
            text-align: center; border-bottom: 1px solid #f0ece6;
        }
        .logo {
            font-family: 'Playfair Display', serif; font-size: 2.5rem;
            letter-spacing: 12px; text-transform: uppercase;
            color: #3e2723; font-weight: 400; margin: 0;
        }

        /* HERO & VIDEO */
        .hero { position: relative; height: 75vh; overflow: hidden; background-color: #000; }
        .hero video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .container { max-width: 1200px; margin: 80px auto; padding: 0 20px; text-align: center; }

        /* ABOUT */
        .about { display: flex; align-items: center; gap: 70px; text-align: left; margin-bottom: 100px; }
        .about-img { flex: 1; height: 500px; border-radius: 250px 250px 20px 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .about-img img { width: 100%; height: 100%; object-fit: cover; }
        .about-text { flex: 1; }
        .about-text h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; }

        /* SECOND VIDEO */
        .second-video-section { width: 100%; height: 60vh; margin: 100px 0; overflow: hidden; position: relative; }
        .second-video-section video { width: 100%; height: 100%; object-fit: cover; }
        .video-caption { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 10px; text-transform: uppercase; text-shadow: 0 2px 20px rgba(0,0,0,0.6); }

        /* 3-COLUMN MENU (ARCHES) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin: 50px 0 120px;
        }
        .menu-column {
            background: white;
            padding: 50px 30px;
            border-radius: 150px 150px 30px 30px; /* Կամարաձև տեսք */
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            border: 1px solid #f0ece6;
        }
        .menu-column h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #8d7b68;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
            font-size: 0.95rem;
        }
        .price { font-weight: 600; color: #a68b6d; }

        footer { background: #1a1412; color: #d8c3a5; padding: 60px; text-align: center; }

        @media (max-width: 1000px) {
            .menu-grid { grid-template-columns: 1fr; }
            .about { flex-direction: column; text-align: center; }
            .menu-column { border-radius: 30px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">LUNALIQ</h1>
    </header>

    <div class="hero">
        <video autoplay muted loop playsinline>
            <source src="https://cdn.shopify.com/videos/c/o/v/c7830c6bfb704c078786e6954d93e900.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <section class="about">
            <div class="about-img">
                <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_48_496598286_17942634347995359_2385501179447426054_n.jpg?v=1776708817">
            </div>
            <div class="about-text">
                <h2>Our Ritual</h2>
                <p>Experience the perfect blend of coffee culture and culinary art.</p>
            </div>
        </section>
    </div>

    <div class="second-video-section">
        <video autoplay muted loop playsinline>
            <source src="https://cdn.shopify.com/videos/c/o/v/42c8e673c11142bd8ced8b5b6263e544.mp4" type="video/mp4">
        </video>
        <div class="video-caption">Art of Taste</div>
    </div>

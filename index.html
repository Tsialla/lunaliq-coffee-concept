<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunaliq Coffee</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f3ef;
}

/* VIDEO */
.hero {
  position: relative;
  height: 100vh;
}

.hero video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT ON VIDEO */
.hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
}

.hero-text h1 {
  font-size: 40px;
}

/* ABOUT */
.about {
  padding: 40px;
  text-align: center;
}

/* GALLERY */
.gallery {
  padding: 40px;
}

.gallery img {
  width: 48%;
  margin: 1%;
}

/* CONTACT */
.contact {
  padding: 40px;
  text-align: center;
}
</style>

</head>

<body>

<!-- VIDEO -->

<div class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.shopify.com/videos/c/o/v/c7830c6bfb704c078786e6954d93e900.mp4">
  </video>

  <div class="hero-text">
    <h1>LUNALIQ COFFEE</h1>
  </div>
</div>

<!-- ABOUT -->

<div class="about">
  <h2>About</h2>
  <p>Cozy coffee and aesthetic moments.</p>
</div>

<!-- GALLERY -->

<div class="gallery">
  <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_48_496598286_17942634347995359_2385501179447426054_n.jpg?v=1776708817">
  <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_52_545018420_17957024291995359_2100240977493378914_n.jpg?v=1776708816">
  <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_53_546500703_17957024300995359_3799390271029334196_n.jpg?v=1776708816">
  <img src="https://cdn.shopify.com/s/files/1/0722/6363/0938/files/imgi_35_528653574_17953049207995359_8994257734604054174_n.jpg?v=1776708816">
</div>

<!-- CONTACT -->

<div class="contact">
  <h2>Contact</h2>
  <p>Email: example@email.com</p>
</div>

</body>
</html>

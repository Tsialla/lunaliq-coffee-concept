            color: #3e2723; 
            overflow-x: hidden;
        }
        
        /* HEADER */
        header {
            background-color: #fdfaf5;
            padding: 35px 0;
            text-align: center;
            border-bottom: 1px solid #f0ece6;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 12px;

            color: #3e2723;
            font-weight: 400;
            margin: 0;
        }

        /* FIRST VIDEO HERO (Հին վիդեոն) */
        .hero {
            position: relative;
            height: 75vh;
            overflow: hidden;
            background-color: #000;
        }
        .hero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .container { 
            max-width: 1100px; 
            margin: 100px auto; 
            padding: 0 20px; 
            text-align: center; 
        }

        /* ABOUT SECTION */
        .about { 
            display: flex; 
            align-items: center; 
            gap: 70px; 
            text-align: left; 
            margin-bottom: 120px; 
        }
        .about-img { 
            flex: 1; 
            height: 550px; 
            border-radius: 300px 300px 20px 20px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .about-img img { width: 100%; height: 100%; object-fit: cover; }
        .about-text { flex: 1; }
        .about-text h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 20px; }
        .about-text p { font-size: 1.1rem; line-height: 1.8; color: #5d4e4a; }

        .grid-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 60px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .grid-item img { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; }
        .grid-item h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-top: 20px; }
